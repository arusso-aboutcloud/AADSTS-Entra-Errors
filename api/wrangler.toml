# entra-errors Worker — wrangler.toml
# Deployed to Cloudflare Workers

name = "entra-errors"
main = "worker.js"
compatibility_date = "2026-04-01"
usage_model = "standard"

# Cron trigger — scrapes Microsoft Learn every 6 hours
[triggers]
crons = ["0 */6 * * *"]

# KV binding (set via `wrangler kv:namespace create` or dashboard)
[[kv_namespaces]]
binding = "ENTRA_ERRORS"
id = "YOUR_KV_NAMESPACE_ID"

# Route (custom domain — configure your own zone)
[[routes]]
pattern = "api.YOUR_DOMAIN/entra-errors*"
zone_name = "YOUR_ZONE"

# Secrets (set via wrangler CLI, never committed)
# wrangler secret put SEED_SECRET

[vars]
# No public vars — SEED_SECRET is a secret (never committed)
